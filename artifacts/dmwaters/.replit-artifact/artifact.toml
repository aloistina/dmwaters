kind = "web"
previewPath = "/"
title = "DM Waters - Bulk Water Delivery Zimbabwe"
version = "1.0.0"
id = "artifacts/dmwaters"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21710
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dmwaters run dev"

[services.env]
PORT = "21710"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dmwaters", "run", "build"]
publicDir = "artifacts/dmwaters/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
